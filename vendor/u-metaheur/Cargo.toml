[package]
name = "u-metaheur"
version = "0.2.0"
edition = "2021"
authors = ["iyulab"]
license = "MIT"
description = "Domain-agnostic metaheuristic optimization framework: GA, BRKGA, SA, ALNS."
repository = "https://github.com/iyulab/u-metaheur"
keywords = ["optimization", "genetic-algorithm", "metaheuristic", "evolutionary"]
categories = ["algorithms", "science"]
readme = "README.md"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = []
serde = ["dep:serde"]
parallel = ["dep:rayon"]
wasm = ["dep:wasm-bindgen", "dep:serde-wasm-bindgen", "dep:serde"]

[dependencies]
u-numflow = { version = "0.2", path = "../u-numflow" }
rand = "0.9"
rayon = { version = "1.10", optional = true }
serde = { version = "1.0", features = ["derive"], optional = true }
wasm-bindgen = { version = "0.2", optional = true }
serde-wasm-bindgen = { version = "0.6", optional = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.3", features = ["wasm_js"] }

[dev-dependencies]
proptest = "1.4"
criterion = "0.5"

[[bench]]
name = "metaheur_bench"
harness = false

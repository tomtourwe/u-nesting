name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'src/wasm.rs'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout path dependencies
        shell: bash
        run: |
          mkdir -p ../../foundation
          git clone --depth 1 https://github.com/iyulab/u-numflow.git ../../foundation/u-numflow

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: jetli/wasm-pack-action@v0.4.0

      - name: Build WASM package
        run: wasm-pack build --target bundler --scope iyulab --features wasm

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: |
          cd pkg
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VER=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VER}" version 2>/dev/null; then
            echo "Version ${PKG_VER} already published, skipping"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

[package]
name = "u-numflow"
version = "0.2.1"
edition = "2021"
authors = ["iyulab"]
license = "MIT"
description = "Mathematical primitives for the U-Engine ecosystem: statistics, probability, random sampling, and collections."
repository = "https://github.com/iyulab/u-numflow"
keywords = ["statistics", "probability", "optimization", "mathematics"]
categories = ["mathematics", "science"]
readme = "README.md"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
wasm = ["dep:wasm-bindgen"]

[dependencies]
rand = "0.9"
wasm-bindgen = { version = "0.2", optional = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.3", features = ["wasm_js"] }

[dev-dependencies]
proptest = "1.4"
